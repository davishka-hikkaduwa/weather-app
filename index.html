<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<title>Weather App</title>
	</head>
	<body>
		<div class="container">
			<section class="top-banner">
				<div class="container">
					<h1 class="heading">Weather App</h1>
					<form>
						<input
							type="text"
							name="city-input"
							id="city-input"
							value=""
							placeholder="Enter the city"
							autofocus
						/>
						<input
							type="text"
							name="country-input"
							id="country-input"
							placeholder="Enter the country code"
						/>
						<button type="submit">SUBMIT</button>
						<span class="msg"></span>
					</form>
				</div>
			</section>
			<sections class="ajax-section">
				<div class="container">
					<ul class="cities">

							<span class="city-temp">...<sup>°C</sup></span>
							<figure>
								<img class="city-icon" src="..." alt="..." />
								<figcaption>...</figcaption>
							</figure>
						</li> -->

</html>
